services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ragapp:
    build: ./ragapp
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    command: >
      sh -c "sleep 10 && python rag.py"

volumes:
  ollama_data:
